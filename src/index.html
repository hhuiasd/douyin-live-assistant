<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音场控助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 顶部状态栏 */
    .header {
      background: #16213e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }
    .status-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.on { background: #4ade80; }
    .status-dot.off { background: #ef4444; }
    .status-label { font-size: 13px; color: #aaa; }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn-primary { background: #e94560; color: white; }
    .btn-success { background: #4ade80; color: #1a1a2e; }
    .btn-warning { background: #f59e0b; color: #1a1a2e; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
    }
    .btn-outline:hover { border-color: #e94560; color: #e94560; }

    /* 主体布局 */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左侧面板 */
    .panel-left {
      width: 280px;
      background: #16213e;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .panel-section {
      padding: 14px 16px;
      border-bottom: 1px solid #0f3460;
    }
    .panel-section h3 {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .toggle-row label {
      font-size: 14px;
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 40px; height: 22px;
      appearance: none;
      background: #333;
      border-radius: 11px;
      cursor: pointer;
      transition: 0.3s;
    }
    .toggle:checked { background: #e94560; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    .toggle:checked::after { left: 20px; }

    /* 中间日志区 */
    .panel-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .log-header {
      padding: 10px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .log-header h3 { font-size: 14px; color: #aaa; }
    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-track { background: #1a1a2e; }
    .log-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .log-entry { padding: 2px 0; }
    .log-entry .time { color: #666; margin-right: 8px; }
    .log-entry.info .msg { color: #4ade80; }
    .log-entry.warn .msg { color: #f59e0b; }
    .log-entry.error .msg { color: #ef4444; }
    .log-entry.chat .msg { color: #60a5fa; }

    /* 右侧配置区 */
    .panel-right {
      width: 320px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
      color: #888;
    }
    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #e94560; border-bottom-color: #e94560; }
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }
    .tab-content::-webkit-scrollbar { width: 6px; }
    .tab-content::-webkit-scrollbar-track { background: #1a1a2e; }
    .tab-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 表单元素 */
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    /* 底部手动输入区 */
    .footer {
      padding: 10px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .footer input {
      flex: 1;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
    }
    .footer input:focus {
      outline: none;
      border-color: #e94560;
    }

    /* 风控面板 */
    .risk-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .risk-card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .risk-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #e94560;
    }
    .risk-card .label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* 关键词规则 */
    .keyword-rule {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .keyword-rule .trigger {
      font-size: 12px;
      color: #f59e0b;
      margin-bottom: 4px;
    }
    .keyword-rule .reply {
      font-size: 12px;
      color: #60a5fa;
    }
    .keyword-rule .delete-btn {
      float: right;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 16px;
    }

    /* 隐藏滚动条但保留功能 */
    .hidden-scroll::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>

  <!-- 顶部状态栏 -->
  <div class="header">
    <h1>抖音场控助手</h1>
    <div class="status-group">
      <div>
        <span class="status-dot" id="wsDot"></span>
        <span class="status-label" id="wsLabel">弹幕服务: 未知</span>
      </div>
      <div>
        <span class="status-dot" id="douyinDot"></span>
        <span class="status-label" id="douyinLabel">抖音: 未连接</span>
      </div>
      <!-- 抖音浏览器控制 -->
      <button class="btn btn-primary" id="openDouyinBtn" onclick="handleOpenDouyin()">打开抖音</button>
      <button class="btn btn-success" id="enterRoomBtn" onclick="handleEnterRoom()" style="display:none;">进入直播间</button>
      <button class="btn btn-outline" id="showDouyinBtn" onclick="handleShowDouyin()" style="display:none;">显示浏览器</button>
      <button class="btn btn-outline" id="logoutBtn" onclick="handleLogout()" style="display:none;">退出登录</button>
      <!-- 运行控制 -->
      <button class="btn btn-warning" id="emergencyBtn" onclick="handleEmergencyStop()">紧急停止</button>
      <button class="btn btn-success" id="resumeBtn" onclick="handleResume()" style="display:none;">恢复运行</button>
      <button class="btn btn-danger" id="exitAppBtn" onclick="handleExitApp()">退出软件</button>
    </div>
  </div>

  <div class="main">
    <!-- 左侧功能开关 -->
    <div class="panel-left">
      <div class="panel-section">
        <h3>功能开关</h3>
        <div class="toggle-row">
          <label for="featWelcome">自动欢迎</label>
          <input type="checkbox" class="toggle" id="featWelcome" checked onchange="toggleFeature('welcome', this.checked)">
        </div>
        <div class="toggle-row">
          <label for="featKeyword">关键词回复</label>
          <input type="checkbox" class="toggle" id="featKeyword" checked onchange="toggleFeature('keyword', this.checked)">
        </div>
        <div class="toggle-row">
          <label for="featGift">礼物答谢</label>
          <input type="checkbox" class="toggle" id="featGift" checked onchange="toggleFeature('gift', this.checked)">
        </div>
        <div class="toggle-row">
          <label for="featWarmup">暖场消息</label>
          <input type="checkbox" class="toggle" id="featWarmup" checked onchange="toggleFeature('warmup', this.checked)">
        </div>
      </div>

      <div class="panel-section">
        <h3>风控状态</h3>
        <div class="risk-grid">
          <div class="risk-card">
            <div class="value" id="riskHourCount">0</div>
            <div class="label">本小时发送</div>
          </div>
          <div class="risk-card">
            <div class="value" id="riskTotalCount">0</div>
            <div class="label">累计发送</div>
          </div>
          <div class="risk-card">
            <div class="value" id="riskFailCount">0</div>
            <div class="label">连续失败</div>
          </div>
          <div class="risk-card">
            <div class="value" id="riskStatus">正常</div>
            <div class="label">运行状态</div>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h3>快捷操作</h3>
        <button class="btn btn-outline" style="width:100%; margin-bottom:6px;" onclick="handleRefreshRoom()">刷新直播间</button>
        <button class="btn btn-outline" style="width:100%; margin-bottom:6px;" onclick="handleStartWarmup()">开启暖场</button>
        <button class="btn btn-outline" style="width:100%;" onclick="handleStopWarmup()">关闭暖场</button>
      </div>
      <div class="panel-section">
        <h3>调试</h3>
        <div class="toggle-row">
          <label for="debugMode">显示原始数据</label>
          <input type="checkbox" class="toggle" id="debugMode" onchange="toggleDebug(this.checked)">
        </div>
        <p style="font-size:11px; color:#666; margin-top:4px;">开启后日志区会显示所有收到的原始数据</p>
      </div>
    </div>

    <!-- 中间日志区 -->
    <div class="panel-center">
      <div class="log-header">
        <h3>运行日志</h3>
        <button class="btn btn-outline" onclick="clearLogs()">清空</button>
      </div>
      <div class="log-area" id="logArea"></div>
      <div class="footer">
        <input type="text" id="manualInput" placeholder="手动输入消息..." onkeydown="if(event.key==='Enter')handleManualSend()">
        <button class="btn btn-primary" onclick="handleManualSend()">发送</button>
      </div>
    </div>

    <!-- 右侧配置区 -->
    <div class="panel-right">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('welcome')">欢迎语</div>
        <div class="tab" onclick="switchTab('keyword')">关键词</div>
        <div class="tab" onclick="switchTab('gift')">礼物</div>
        <div class="tab" onclick="switchTab('setting')">设置</div>
      </div>
      <div class="tab-content">
        <!-- 欢迎语配置 -->
        <div class="tab-panel active" id="tab-welcome">
          <div class="form-group">
            <label>欢迎语模板（每行一条，随机抽取）</label>
            <textarea id="welcomeTemplates" rows="6" placeholder="欢迎 {nickname} 来到直播间~"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveWelcomeConfig()">保存</button>
        </div>

        <!-- 关键词配置 -->
        <div class="tab-panel" id="tab-keyword">
          <div id="keywordRules"></div>
          <div class="form-group" style="margin-top: 10px;">
            <label>触发词（正则，用 | 分隔）</label>
            <input type="text" id="newKeywordTrigger" placeholder="价格|多少钱">
          </div>
          <div class="form-group">
            <label>回复内容（每行一条）</label>
            <textarea id="newKeywordReply" rows="2" placeholder="私信主播了解详情哦~"></textarea>
          </div>
          <button class="btn btn-primary" onclick="addKeywordRule()">添加规则</button>
          <button class="btn btn-outline" onclick="saveKeywordConfig()" style="margin-left:6px;">保存全部</button>
        </div>

        <!-- 礼物配置 -->
        <div class="tab-panel" id="tab-gift">
          <div class="form-group">
            <label>答谢语模板（每行一条）</label>
            <textarea id="giftTemplates" rows="6" placeholder="感谢 {nickname} 送的 {giftName}~"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveGiftConfig()">保存</button>
        </div>

        <!-- 设置面板 -->
        <div class="tab-panel" id="tab-setting">
          <div class="form-group">
            <label>直播间 WebRoomId</label>
            <input type="text" id="cfgWebRoomId" placeholder="89893313081">
          </div>
          <div class="form-group">
            <label>Chrome/Edge 路径（留空自动检测）</label>
            <input type="text" id="cfgChromePath" placeholder="C:\Program Files\Google\Chrome\Application\chrome.exe">
          </div>
          <div class="form-group">
            <label>每小时最大发送条数</label>
            <input type="number" id="cfgMaxPerHour" value="30" min="1" max="200">
          </div>
          <div class="form-group">
            <label>发送间隔最小 (ms)</label>
            <input type="number" id="cfgIntervalMin" value="1000" min="500" max="10000">
          </div>
          <div class="form-group">
            <label>发送间隔最大 (ms)</label>
            <input type="number" id="cfgIntervalMax" value="3000" min="1000" max="15000">
          </div>
          <div class="form-group">
            <label>欢迎冷却时间 (分钟)</label>
            <input type="number" id="cfgWelcomeCooldown" value="5" min="1" max="60">
          </div>
          <div class="form-group">
            <label>暖场消息间隔 (分钟)</label>
            <input type="number" id="cfgWarmupInterval" value="3" min="1" max="30">
          </div>
          <button class="btn btn-primary" onclick="saveSettingConfig()">保存设置</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 初始化 ====================
    let config = { rule: {}, runtime: {} };

    async function init() {
      const result = await window.electronAPI.getConfig();
      config = result;
      loadUIFromConfig();

      // 检查 WebSocket 状态
      const wsStatus = await window.electronAPI.getWsStatus();
      updateWsStatus(wsStatus);

      // 检查风控状态
      const riskState = await window.electronAPI.getRiskState();
      updateRiskUI(riskState);

      // 检查登录状态
      await checkAndUpdateLoginUI();
    }

    async function checkAndUpdateLoginUI() {
      const status = await window.electronAPI.checkLoginStatus();
      if (status.hasCookies || status.isLoggedIn) {
        // 已登录状态
        document.getElementById('openDouyinBtn').style.display = 'none';
        document.getElementById('enterRoomBtn').style.display = '';
        document.getElementById('showDouyinBtn').style.display = '';
        document.getElementById('logoutBtn').style.display = '';
        document.getElementById('douyinDot').className = 'status-dot on';
        document.getElementById('douyinLabel').textContent = '抖音: 已连接';
      } else {
        // 未登录状态
        document.getElementById('openDouyinBtn').style.display = '';
        document.getElementById('enterRoomBtn').style.display = 'none';
        document.getElementById('showDouyinBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('douyinDot').className = 'status-dot off';
        document.getElementById('douyinLabel').textContent = '抖音: 未连接';
      }
    }

    function loadUIFromConfig() {
      const rule = config.rule;
      const rt = config.runtime;

      // 功能开关
      document.getElementById('featWelcome').checked = rt.features?.welcome !== false;
      document.getElementById('featKeyword').checked = rt.features?.keyword !== false;
      document.getElementById('featGift').checked = rt.features?.gift !== false;
      document.getElementById('featWarmup').checked = rt.features?.warmup !== false;

      // 欢迎语
      document.getElementById('welcomeTemplates').value = (rule.welcome?.templates || []).join('\n');

      // 礼物
      document.getElementById('giftTemplates').value = (rule.gift?.templates || []).join('\n');

      // 关键词
      renderKeywordRules(rule.keyword?.rules || []);

      // 设置
      document.getElementById('cfgWebRoomId').value = rt.webRoomId || '';
      document.getElementById('cfgChromePath').value = rt.chromePath || '';
      document.getElementById('cfgMaxPerHour').value = rt.riskControl?.globalMaxPerHour || 30;
      document.getElementById('cfgIntervalMin').value = rt.riskControl?.sendIntervalMin || 1000;
      document.getElementById('cfgIntervalMax').value = rt.riskControl?.sendIntervalMax || 3000;
      document.getElementById('cfgWelcomeCooldown').value = rt.riskControl?.welcomeCooldownMinutes || 5;
      document.getElementById('cfgWarmupInterval').value = rule.warmup?.intervalMinutes || 3;
    }

    // ==================== 事件监听 ====================
    window.electronAPI.onBarrage((msg) => {
      const content = msg.Content || JSON.stringify(msg).substring(0, 100);
      addLog('chat', `弹幕: ${content}`);
    });

    window.electronAPI.onLog((entry) => {
      addLog(entry.level, entry.message, entry.time);
    });

    window.electronAPI.onWsStatus((status) => {
      updateWsStatus(status);
    });

    window.electronAPI.onCircuitBreak((broken) => {
      if (broken) {
        document.getElementById('emergencyBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = '';
        document.getElementById('riskStatus').textContent = '熔断';
        document.getElementById('riskStatus').style.color = '#ef4444';
      }
    });

    // 登录状态
    window.electronAPI.onLoginStatus((status) => {
      if (status === 'success') {
        addLog('info', '登录成功');
        checkAndUpdateLoginUI();
      } else if (status === 'logged-out') {
        checkAndUpdateLoginUI();
      }
    });

    // 直播间号自动检测
    window.electronAPI.onRoomDetected((roomId) => {
      document.getElementById('cfgWebRoomId').value = roomId;
      config.runtime.webRoomId = roomId;
      addLog('info', `已自动填入直播间号: ${roomId}`);
    });

    // 原始数据（调试模式）
    window.electronAPI.onRawMessage((msg) => {
      const brief = JSON.stringify(msg).substring(0, 200);
      addLog('warn', `[原始] ${brief}`);
    });

    // ==================== 日志系统 ====================
    function addLog(level, message, time) {
      const logArea = document.getElementById('logArea');
      const entry = document.createElement('div');
      entry.className = `log-entry ${level}`;
      const t = time || new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="time">[${t}]</span><span class="msg">${escapeHtml(message)}</span>`;
      logArea.appendChild(entry);
      logArea.scrollTop = logArea.scrollHeight;

      // 限制日志数量
      while (logArea.children.length > 500) {
        logArea.removeChild(logArea.firstChild);
      }
    }

    function clearLogs() {
      document.getElementById('logArea').innerHTML = '';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ==================== 状态更新 ====================
    function updateWsStatus(status) {
      const dot = document.getElementById('wsDot');
      const label = document.getElementById('wsLabel');
      if (status === 'connected') {
        dot.className = 'status-dot on';
        label.textContent = '弹幕服务: 已连接';
      } else {
        dot.className = 'status-dot off';
        label.textContent = '弹幕服务: 未连接';
      }
    }

    function updateRiskUI(state) {
      document.getElementById('riskHourCount').textContent = state.hourSendCount || 0;
      document.getElementById('riskTotalCount').textContent = state.sendCount || 0;
      document.getElementById('riskFailCount').textContent = state.consecutiveFailures || 0;

      if (state.circuitBroken) {
        document.getElementById('riskStatus').textContent = '熔断';
        document.getElementById('riskStatus').style.color = '#ef4444';
        document.getElementById('emergencyBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = '';
      } else {
        document.getElementById('riskStatus').textContent = '正常';
        document.getElementById('riskStatus').style.color = '#4ade80';
        document.getElementById('emergencyBtn').style.display = '';
        document.getElementById('resumeBtn').style.display = 'none';
      }
    }

    // ==================== 操作处理 ====================
    async function handleOpenDouyin() {
      document.getElementById('openDouyinBtn').disabled = true;
      document.getElementById('openDouyinBtn').textContent = '启动中...';
      addLog('info', '正在打开抖音直播页面...');

      await window.electronAPI.openDouyin();

      document.getElementById('openDouyinBtn').disabled = false;
      document.getElementById('openDouyinBtn').textContent = '打开抖音';
      addLog('info', '浏览器已打开，请在窗口中扫码登录');
      addLog('info', '登录后直接点击进入直播间，软件会自动检测房间号');
    }

    async function handleEnterRoom() {
      const roomId = document.getElementById('cfgWebRoomId').value.trim();
      if (!roomId) {
        addLog('warn', '请先输入直播间号');
        return;
      }
      await window.electronAPI.enterRoom(roomId);
      addLog('info', `正在进入直播间: ${roomId}`);
    }

    async function handleLogout() {
      if (confirm('确定要退出登录并清除缓存吗？')) {
        await window.electronAPI.clearCache();
        await checkAndUpdateLoginUI();
        document.getElementById('cfgWebRoomId').value = '';
        addLog('info', '已退出登录并清除缓存');
      }
    }

    async function handleShowDouyin() {
      await window.electronAPI.showDouyin();
      addLog('info', '已显示浏览器窗口');
    }

    async function handleEmergencyStop() {
      await window.electronAPI.emergencyStop();
      addLog('warn', '紧急停止已触发');
      document.getElementById('emergencyBtn').style.display = 'none';
      document.getElementById('resumeBtn').style.display = '';
      document.getElementById('riskStatus').textContent = '熔断';
      document.getElementById('riskStatus').style.color = '#ef4444';
    }

    async function handleResume() {
      await window.electronAPI.resumeAuto();
      addLog('info', '自动评论已恢复');
      document.getElementById('emergencyBtn').style.display = '';
      document.getElementById('resumeBtn').style.display = 'none';
      document.getElementById('riskStatus').textContent = '正常';
      document.getElementById('riskStatus').style.color = '#4ade80';
    }

    async function handleExitApp() {
      if (confirm('确定要退出软件吗？')) {
        await window.electronAPI.exitApp();
      }
    }

    async function handleRefreshRoom() {
      await window.electronAPI.refreshRoom();
      addLog('info', '正在刷新直播间...');
    }

    async function toggleDebug(enabled) {
      await window.electronAPI.toggleDebug(enabled);
      if (enabled) {
        addLog('info', '调试模式已开启，将显示所有原始数据');
      }
    }

    async function handleManualSend() {
      const input = document.getElementById('manualInput');
      const text = input.value.trim();
      if (!text) return;
      await window.electronAPI.sendMessage(text);
      input.value = '';
    }

    async function handleStartWarmup() {
      await window.electronAPI.startWarmup();
      addLog('info', '暖场消息已开启');
    }

    async function handleStopWarmup() {
      await window.electronAPI.stopWarmup();
      addLog('info', '暖场消息已关闭');
    }

    // ==================== 功能开关 ====================
    async function toggleFeature(feature, enabled) {
      config.runtime.features[feature] = enabled;
      await window.electronAPI.saveRuntimeConfig(config.runtime);
      addLog('info', `${feature} 功能已${enabled ? '开启' : '关闭'}`);
    }

    // ==================== Tab 切换 ====================
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

      event.target.classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ==================== 配置保存 ====================
    async function saveWelcomeConfig() {
      const text = document.getElementById('welcomeTemplates').value;
      const templates = text.split('\n').map(s => s.trim()).filter(s => s);
      config.rule.welcome.templates = templates;
      await window.electronAPI.saveRuleConfig(config.rule);
      addLog('info', '欢迎语配置已保存');
    }

    function renderKeywordRules(rules) {
      const container = document.getElementById('keywordRules');
      container.innerHTML = '';
      rules.forEach((rule, idx) => {
        const div = document.createElement('div');
        div.className = 'keyword-rule';
        div.innerHTML = `
          <button class="delete-btn" onclick="deleteKeywordRule(${idx})">&times;</button>
          <div class="trigger">触发: ${escapeHtml(rule.trigger)}</div>
          <div class="reply">回复: ${(rule.reply || []).join(' / ')}</div>
        `;
        container.appendChild(div);
      });
    }

    async function addKeywordRule() {
      const trigger = document.getElementById('newKeywordTrigger').value.trim();
      const replyText = document.getElementById('newKeywordReply').value.trim();
      if (!trigger || !replyText) return;

      const reply = replyText.split('\n').map(s => s.trim()).filter(s => s);
      if (!config.rule.keyword) config.rule.keyword = { enabled: true, rules: [] };
      if (!config.rule.keyword.rules) config.rule.keyword.rules = [];

      config.rule.keyword.rules.push({ trigger, reply });
      renderKeywordRules(config.rule.keyword.rules);

      document.getElementById('newKeywordTrigger').value = '';
      document.getElementById('newKeywordReply').value = '';
    }

    async function deleteKeywordRule(idx) {
      config.rule.keyword.rules.splice(idx, 1);
      renderKeywordRules(config.rule.keyword.rules);
    }

    async function saveKeywordConfig() {
      await window.electronAPI.saveRuleConfig(config.rule);
      addLog('info', '关键词配置已保存');
    }

    async function saveGiftConfig() {
      const text = document.getElementById('giftTemplates').value;
      const templates = text.split('\n').map(s => s.trim()).filter(s => s);
      config.rule.gift.templates = templates;
      await window.electronAPI.saveRuleConfig(config.rule);
      addLog('info', '礼物答谢配置已保存');
    }

    async function saveSettingConfig() {
      config.runtime.webRoomId = document.getElementById('cfgWebRoomId').value.trim();
      config.runtime.chromePath = document.getElementById('cfgChromePath').value.trim();
      config.runtime.riskControl = {
        globalMaxPerHour: parseInt(document.getElementById('cfgMaxPerHour').value) || 30,
        sendIntervalMin: parseInt(document.getElementById('cfgIntervalMin').value) || 1000,
        sendIntervalMax: parseInt(document.getElementById('cfgIntervalMax').value) || 3000,
        circuitBreakerThreshold: config.runtime.riskControl?.circuitBreakerThreshold || 3,
        welcomeCooldownMinutes: parseInt(document.getElementById('cfgWelcomeCooldown').value) || 5,
      };

      // 更新暖场间隔
      if (config.rule.warmup) {
        config.rule.warmup.intervalMinutes = parseInt(document.getElementById('cfgWarmupInterval').value) || 3;
        await window.electronAPI.saveRuleConfig(config.rule);
      }

      await window.electronAPI.saveRuntimeConfig(config.runtime);
      addLog('info', '设置已保存');
    }

    // ==================== 初始化加载 ====================
    init();
  </script>
</body>
</html>
